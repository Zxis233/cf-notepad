name = "notepad"
main = "src/index.js"
compatibility_date = "2026-03-02"

[[kv_namespaces]]
binding = "NOTES"

[[kv_namespaces]]
binding = "SHARE"

[vars]
SCN_APP_NAME = "Esing Cloud Notepad"
SCN_SALT = "25A39F3A-BA6E-4ED3-9E5B-3FDC8A8B2406 "
SCN_SECRET = "10BD2ACC-CD16-4218-A92D-CA808D682CFF"
SCN_ADMIN_PATH = "/admin"
SCN_ADMIN_PW = "admin-password"
SCN_SLUG_LENGTH = "3"
SCN_ENABLE_R2 = "0"
SCN_R2_DOMAIN = "https://your-r2-domain.com"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "cloud-notepad-images"

# Cron trigger: Daily cleanup at 9 AM Taiwan time (1 AM UTC)
[triggers]
crons = ["0 1 * * *"]